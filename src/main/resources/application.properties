spring.application.name=sistemaControleMateriais


#Diz o caminho do banco
spring.datasource.url=jdbc:mysql://localhost:3306/sistemaControleMaterial

#Diz o usuario e a senha
spring.datasource.username=root
spring.datasource.password=root

#Diz que pode altera e mudar
spring.jpa.hibernate.ddl-auto=update

#mostra no terminal o codigo
spring.jpa.show-sql=true

#Ele formata o MYSQL
spring.jpa.properties.hibernate.format_sql=true

#Mostra a porta que o serviço esta funcionando
server.port=2012
